<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 28px; background: var(--ivory); color: var(--ink); }
  .row { display: grid; grid-template-columns: 120px 1fr; align-items: baseline; padding: 8px 0; border-bottom: 1px solid var(--line); gap: 16px; }
  .row:last-child { border-bottom: 0; }
  .tag { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.22em; font-size: 10px; color: var(--graphite); }
  .sample { font-family: var(--font-display); font-weight: 400; color: var(--ink); }
  .s1 { font-size: 44px; line-height: 1; letter-spacing: -0.02em; }
  .s2 { font-size: 30px; line-height: 1.05; letter-spacing: -0.01em; }
  .s3 { font-size: 22px; line-height: 1.15; font-style: italic; }
  .s4 { font-family: var(--font-body); font-size: 16px; line-height: 1.5; color: var(--graphite); }
  .s5 { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.25em; font-size: 11px; color: var(--graphite); }
</style>
</head>
<body>
  <div class="row"><div class="tag">H1 · 44–88</div><div class="sample s1">Display headline</div></div>
  <div class="row"><div class="tag">H2 · 36–60</div><div class="sample s2">Section title</div></div>
  <div class="row"><div class="tag">Quote · 22</div><div class="sample s3">“An editorial pull-quote.”</div></div>
  <div class="row"><div class="tag">Body · 16</div><div class="sample s4">Geist 400, line-height 1.6, max 62ch. Left-aligned prose for long body.</div></div>
  <div class="row"><div class="tag">Mono · 11</div><div class="sample s5">FIG. 01 — Figure label</div></div>
</body>
</html>
