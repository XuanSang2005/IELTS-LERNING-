<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Principle Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 26px; background: var(--ivory); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); background: var(--line); gap: 1px; border: 1px solid var(--line); }
  .cell { background: var(--ivory); padding: 16px 14px; min-height: 130px; display: flex; flex-direction: column; justify-content: space-between; }
  .num { font-family: var(--font-display); font-style: italic; font-size: 44px; color: rgba(107,31,26,0.8); line-height: 1; }
  .t { font-family: var(--font-display); font-size: 18px; line-height: 1.15; color: var(--ink); margin-top: 14px; }
  .b { font-family: var(--font-display); font-style: italic; font-size: 13px; color: var(--graphite); margin-top: 4px; line-height: 1.4; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><div class="num">I</div><div><div class="t">Diagnose.</div><div class="b">Find the plateau before breaking it.</div></div></div>
    <div class="cell"><div class="num">II</div><div><div class="t">Chunks, not words.</div><div class="b">Multi-word units, always.</div></div></div>
    <div class="cell"><div class="num">III</div><div><div class="t">Feedback in minutes.</div><div class="b">Same-day review.</div></div></div>
  </div>
</body>
</html>
