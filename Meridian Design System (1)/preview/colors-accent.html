<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colors — Accents & Line</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 1px solid var(--line); }
  .swatch { padding: 14px 14px 16px; border-right: 1px solid var(--line); display: flex; flex-direction: column; justify-content: space-between; min-height: 140px; }
  .swatch:last-child { border-right: 0; }
  .chip { width: 100%; height: 52px; margin-bottom: 12px; border: 1px solid rgba(20,18,16,0.08); }
  .name { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.22em; font-size: 10px; color: var(--graphite); }
  .role { font-family: var(--font-display); font-style: italic; font-size: 13px; color: var(--graphite); margin-top: 2px; line-height: 1.3; }
  .hex { font-family: var(--font-display); font-size: 15px; color: var(--ink); margin-top: 6px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch">
      <div class="chip" style="background:#6B1F1A"></div>
      <div><div class="name">Claret</div><div class="role">The accent. 3–5 times per page.</div><div class="hex">#6B1F1A</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#6B7F5A"></div>
      <div><div class="name">Sage</div><div class="role">Tertiary green — duotone alt.</div><div class="hex">#6B7F5A</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#B58A3C"></div>
      <div><div class="name">Ochre</div><div class="role">Rosettes, diamond separators.</div><div class="hex">#B58A3C</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#C9BFA8"></div>
      <div><div class="name">Line</div><div class="role">Hairlines, card borders.</div><div class="hex">#C9BFA8</div></div>
    </div>
  </div>
</body>
</html>
