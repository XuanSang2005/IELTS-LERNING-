<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Form Input</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--ivory); display: flex; flex-direction: column; gap: 18px; max-width: 440px; }
  label { display: block; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.25em; font-size: 10px; color: var(--graphite); margin-bottom: 8px; }
  input { display: block; width: 100%; box-sizing: border-box; background: transparent; border: 0; border-bottom: 1px solid var(--line); padding: 8px 0 10px; font-family: var(--font-display); font-size: 20px; color: var(--ink); outline: none; transition: border-color 200ms; }
  input::placeholder { color: var(--graphite); font-style: italic; }
  input:focus { border-bottom-color: var(--claret); }
  .help { font-family: var(--font-display); font-style: italic; font-size: 13px; color: var(--graphite); margin-top: 6px; }
</style>
</head>
<body>
  <div>
    <label>Email address</label>
    <input type="email" placeholder="your.name@email.com">
    <div class="help">We will write once a week. Never more.</div>
  </div>
  <div>
    <label>Target band</label>
    <input type="text" value="7.0 – 7.5">
  </div>
</body>
</html>
