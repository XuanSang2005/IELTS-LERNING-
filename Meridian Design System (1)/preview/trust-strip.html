<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trust Strip</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--ivory); }
  .strip { border-top: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; padding: 14px 6px; }
  .item { display: flex; align-items: center; }
  .d { color: var(--claret); font-size: 10px; margin: 0 14px; }
  .label { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.25em; font-size: 10px; color: var(--graphite); }
  .val { font-family: var(--font-display); font-size: 18px; color: var(--ink); margin-top: 2px; }
</style>
</head>
<body>
  <div class="strip">
    <div class="item"><div><div class="label">Avg. gain</div><div class="val">+1.7 bands</div></div></div>
    <span class="d">◆</span>
    <div class="item"><div><div class="label">Cohort size</div><div class="val">14 candidates</div></div></div>
    <span class="d">◆</span>
    <div class="item"><div><div class="label">Pass rate (7.0+)</div><div class="val">94%</div></div></div>
    <span class="d">◆</span>
    <div class="item"><div><div class="label">Featured in</div><div class="val">The Times · FT · Monocle</div></div></div>
  </div>
</body>
</html>
