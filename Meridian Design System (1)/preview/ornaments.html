<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ornaments</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--ivory); display: flex; gap: 30px; justify-content: center; align-items: center; color: var(--claret); }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .cap { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.25em; font-size: 10px; color: var(--graphite); }
</style>
</head>
<body>
  <div class="item">
    <svg width="110" height="110" viewBox="0 0 120 120" fill="none" stroke="currentColor">
      <rect x="6" y="6" width="108" height="108" stroke-width="0.7" opacity="0.5"/>
      <rect x="14" y="14" width="92" height="92" stroke-width="0.5" opacity="0.35"/>
      <g stroke-width="0.6" opacity="0.7">
        <line x1="60" y1="34" x2="60" y2="86" transform="rotate(0 60 60)"/>
        <line x1="60" y1="34" x2="60" y2="86" transform="rotate(22.5 60 60)"/>
        <line x1="60" y1="34" x2="60" y2="86" transform="rotate(45 60 60)"/>
        <line x1="60" y1="34" x2="60" y2="86" transform="rotate(67.5 60 60)"/>
        <line x1="60" y1="34" x2="60" y2="86" transform="rotate(90 60 60)"/>
        <line x1="60" y1="34" x2="60" y2="86" transform="rotate(112.5 60 60)"/>
        <line x1="60" y1="34" x2="60" y2="86" transform="rotate(135 60 60)"/>
        <line x1="60" y1="34" x2="60" y2="86" transform="rotate(157.5 60 60)"/>
        <circle cx="60" cy="60" r="14" stroke-width="0.7"/>
        <circle cx="60" cy="60" r="2.4" fill="currentColor" stroke="none"/>
      </g>
    </svg>
    <div class="cap">PL. I — Plate</div>
  </div>
  <div class="item">
    <svg width="110" height="110" viewBox="0 0 240 240" fill="none" stroke="currentColor">
      <circle cx="120" cy="120" r="42" stroke-width="0.8" opacity="0.45"/>
      <circle cx="120" cy="120" r="72" stroke-width="0.8" opacity="0.3"/>
      <circle cx="120" cy="120" r="104" stroke-width="0.8" opacity="0.18"/>
      <circle cx="192" cy="120" r="3" fill="#6B1F1A"/>
      <circle cx="48" cy="120" r="2" fill="#6B7F5A"/>
    </svg>
    <div class="cap">Orbits — SRS</div>
  </div>
  <div class="item">
    <svg width="80" height="130" viewBox="0 0 160 260" fill="none" stroke="currentColor" stroke-width="0.9" stroke-linecap="round">
      <path d="M 100 12 C 80 80, 62 150, 40 240"/>
      <g opacity="0.5">
        <line x1="98" y1="20" x2="76" y2="8"/><line x1="90" y1="50" x2="66" y2="38"/>
        <line x1="82" y1="80" x2="58" y2="70"/><line x1="74" y1="110" x2="50" y2="100"/>
        <line x1="66" y1="140" x2="42" y2="130"/><line x1="58" y1="170" x2="36" y2="162"/>
        <line x1="98" y1="20" x2="120" y2="30"/><line x1="90" y1="50" x2="112" y2="58"/>
        <line x1="82" y1="80" x2="104" y2="86"/><line x1="74" y1="110" x2="96" y2="114"/>
      </g>
      <path d="M 40 240 L 34 252 L 30 246 Z" fill="currentColor" stroke="none" opacity="0.7"/>
    </svg>
    <div class="cap">Feather — Writing</div>
  </div>
</body>
</html>
