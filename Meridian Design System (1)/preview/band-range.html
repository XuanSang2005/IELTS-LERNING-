<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Band Range</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 26px; background: var(--ivory); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); border: 1px solid var(--line); }
  .cell { padding: 14px 14px 16px; border-right: 1px solid var(--line); min-height: 120px; display: flex; flex-direction: column; justify-content: space-between; }
  .cell:last-child { border-right: 0; }
  .band { font-family: var(--font-display); font-size: 26px; line-height: 1; color: var(--ink); }
  .lv { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.25em; font-size: 10px; color: var(--claret); margin-top: 10px; }
  .line { font-family: var(--font-display); font-style: italic; font-size: 13px; line-height: 1.35; color: var(--graphite); margin-top: 8px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><div class="band">5.0 – 5.5</div><div><div class="lv">Foundation</div><div class="line">Architecture, taught explicitly.</div></div></div>
    <div class="cell"><div class="band">6.0 – 6.5</div><div><div class="lv">Intermediate</div><div class="line">Fluency, precision, nerve.</div></div></div>
    <div class="cell"><div class="band">7.0 – 7.5</div><div><div class="lv">Advanced</div><div class="line">Register under pressure.</div></div></div>
    <div class="cell"><div class="band">8.0 +</div><div><div class="lv">Mastery</div><div class="line">Examiner-aware edges.</div></div></div>
  </div>
</body>
</html>
