<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 30px 36px; background: var(--ivory); display: flex; align-items: center; gap: 42px; }
  .mark { position: relative; }
  .word { font-family: var(--font-display); font-weight: 500; font-size: 44px; line-height: 1; letter-spacing: -0.01em; }
  .word .c { color: var(--claret); }
  .word .k { color: var(--ink); }
  .sub { margin-top: 6px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.25em; font-size: 11px; color: var(--graphite); }
  .alt { font-family: var(--font-display); font-weight: 500; font-size: 44px; color: var(--ivory); background: var(--ink-warm); padding: 10px 22px; }
  .alt .c { color: var(--claret); }
</style>
</head>
<body>
  <div class="mark">
    <div class="word"><span class="c">M</span><span class="k">eridian</span></div>
    <div class="sub">IELTS · EST. MMXXIV</div>
  </div>
  <div class="alt"><span class="c">M</span>eridian</div>
</body>
</html>
