<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 28px; background: var(--ivory); }
  .row { display: flex; align-items: center; gap: 18px; padding: 6px 0; border-bottom: 1px solid var(--line); }
  .row:last-child { border: 0; }
  .t { width: 80px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.22em; font-size: 10px; color: var(--graphite); }
  .bar { height: 10px; background: var(--claret); }
  .px { font-family: var(--font-display); font-size: 13px; color: var(--ink); font-style: italic; }
</style>
</head>
<body>
  <div class="row"><div class="t">sp-1</div><div class="bar" style="width:4px"></div><div class="px">4 px</div></div>
  <div class="row"><div class="t">sp-2</div><div class="bar" style="width:8px"></div><div class="px">8 px</div></div>
  <div class="row"><div class="t">sp-4</div><div class="bar" style="width:16px"></div><div class="px">16 px</div></div>
  <div class="row"><div class="t">sp-6</div><div class="bar" style="width:24px"></div><div class="px">24 px</div></div>
  <div class="row"><div class="t">sp-10</div><div class="bar" style="width:40px"></div><div class="px">40 px</div></div>
  <div class="row"><div class="t">sp-14</div><div class="bar" style="width:56px"></div><div class="px">56 px</div></div>
  <div class="row"><div class="t">sp-20</div><div class="bar" style="width:80px"></div><div class="px">80 px · section breathing</div></div>
</body>
</html>
