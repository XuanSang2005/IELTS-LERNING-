<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Editorial Quote</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 34px; background: var(--ivory); }
  .wrap { border-left: 2px solid var(--claret); padding: 6px 0 6px 24px; max-width: 520px; }
  .eye { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.25em; font-size: 10px; color: var(--claret); margin-bottom: 10px; }
  .q { font-family: var(--font-display); font-style: italic; font-size: 24px; line-height: 1.35; color: var(--ink); }
  .att { margin-top: 14px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.25em; font-size: 10px; color: var(--graphite); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eye">§ — Editorial note</div>
    <div class="q">"The candidate who plateaus does not lack effort. They lack a system."</div>
    <div class="att">— The founder, Band 8.5 Overall</div>
  </div>
</body>
</html>
