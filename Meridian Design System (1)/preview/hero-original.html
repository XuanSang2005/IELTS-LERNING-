<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hero — Original (codebase)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 28px; background: var(--ivory); font-family: var(--font-body); color: var(--ink); }
  .eye { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.25em; margin: 0; }
  .eye .g { color: var(--graphite); }
  .eye .c { color: var(--claret); }
  h1 { font-family: var(--font-display); font-weight: 400; font-size: 44px; line-height: 0.98; letter-spacing: -0.02em; margin: 14px 0 0; }
  h1 span { display: block; }
  .italic { position: relative; font-style: italic; display: inline-block; }
  .italic svg { position: absolute; left: 0; right: 0; bottom: -3px; width: 100%; height: 6px; }
  p.body { margin-top: 16px; max-width: 42ch; font-size: 14px; line-height: 1.55; color: var(--graphite); }
  p.body b { color: var(--ink); font-weight: 400; }
  .cta { margin-top: 22px; display: inline-flex; align-items: center; gap: 10px; background: var(--ink-warm); color: var(--ivory); padding: 12px 22px; font-family: var(--font-body); font-size: 11px; text-transform: uppercase; letter-spacing: 0.22em; position: relative; }
  .cta span.arrow { color: var(--claret); }
  .cta::after { content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 2px; background: var(--claret); }
  .link { margin-left: 18px; font-size: 13px; color: var(--ink); text-decoration: underline; text-decoration-color: var(--line); text-underline-offset: 3px; }
</style>
</head>
<body>
  <p class="eye"><span class="g">FIG. 01 —</span> <span class="c">IELTS preparation, refined</span></p>
  <h1>
    <span>The quiet craft of</span>
    <span>scoring <span class="italic">Band 9,
      <svg viewBox="0 0 200 10" preserveAspectRatio="none"><path d="M2,6 Q50,2 100,5 T198,4" stroke="#6B1F1A" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>
    </span></span>
    <span>without the noise.</span>
  </h1>
  <p class="body">A considered programme for Band 7.5+ candidates. <b>One cohort. Twelve weeks.</b></p>
  <a class="cta">Begin your assessment <span class="arrow">→</span></a>
  <a class="link">Read the method ↗</a>
</body>
</html>
