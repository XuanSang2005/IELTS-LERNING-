<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type — Display (Fraunces)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--ivory); }
  .eye { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.25em; font-size: 10px; color: var(--graphite); margin-bottom: 14px; }
  .eye .a { color: var(--claret); }
  h1.display { font-family: var(--font-display); font-weight: 400; font-size: 64px; line-height: 0.95; letter-spacing: -0.02em; color: var(--ink); margin: 0; }
  h1.display em { font-style: italic; font-weight: 400; }
  .u { position: relative; display: inline-block; }
  .u::after { content:''; position:absolute; left:0; right:0; bottom:-4px; height:10px;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 10' preserveAspectRatio='none'><path d='M2,6 Q50,2 100,5 T198,4' stroke='%236B1F1A' stroke-width='2.5' fill='none' stroke-linecap='round'/></svg>") no-repeat center / 100% 100%; }
  .meta { margin-top: 22px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.2em; font-size: 10px; color: var(--graphite); display: flex; gap: 18px; }
</style>
</head>
<body>
  <div class="eye"><span>FIG. 01 —</span> <span class="a">Display headline</span></div>
  <h1 class="display">The quiet <span class="u"><em>craft</em></span> of Band 9.</h1>
  <div class="meta">
    <span>Fraunces 400</span><span>64 / 0.95 / -0.02em</span><span>Italicise one word</span>
  </div>
</body>
</html>
