<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Button — Secondary & Text Link</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--ivory); display: flex; flex-direction: column; gap: 22px; align-items: flex-start; }
  .note { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.22em; font-size: 10px; color: var(--graphite); }
  .outline { font-family: var(--font-body); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.18em; color: var(--ink); padding: 10px 22px; border: 1px solid var(--ink); text-decoration: none; transition: all 200ms var(--ease-editorial); }
  .outline:hover { background: var(--ink); color: var(--ivory); }
  .tlink { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-body); font-size: 14px; color: var(--ink); text-decoration: none; }
  .tlink .t { position: relative; }
  .tlink .t::after { content:''; position:absolute; left:0; right:0; bottom:-2px; height:1px; background: var(--line); transition: background 200ms; }
  .tlink:hover .t::after { background: var(--ink); }
  .tlink .a { color: var(--ink); transition: all 200ms; }
  .tlink:hover .a { color: var(--claret); transform: translateX(2px); }
</style>
</head>
<body>
  <div class="note">Outlined · secondary</div>
  <a class="outline" href="#">Sign up</a>
  <div class="note">Text link · tertiary</div>
  <a class="tlink" href="#"><span class="t">Read the method</span><span class="a">↗</span></a>
</body>
</html>
