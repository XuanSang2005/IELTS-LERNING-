<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colors — Primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0; border: 1px solid var(--line); }
  .swatch { padding: 14px 14px 16px; border-right: 1px solid var(--line); display: flex; flex-direction: column; justify-content: space-between; min-height: 120px; }
  .swatch:last-child { border-right: 0; }
  .chip { width: 100%; height: 42px; margin-bottom: 12px; border: 1px solid rgba(20,18,16,0.08); }
  .name { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.22em; font-size: 10px; color: var(--graphite); }
  .hex { font-family: var(--font-display); font-size: 15px; color: var(--ink); margin-top: 4px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:#F6F1E7"></div><div><div class="name">Ivory</div><div class="hex">#F6F1E7</div></div></div>
    <div class="swatch"><div class="chip" style="background:#EEE7D8"></div><div><div class="name">Bone</div><div class="hex">#EEE7D8</div></div></div>
    <div class="swatch"><div class="chip" style="background:#141210"></div><div><div class="name">Ink</div><div class="hex">#141210</div></div></div>
    <div class="swatch"><div class="chip" style="background:#2A2622"></div><div><div class="name">Ink-warm</div><div class="hex">#2A2622</div></div></div>
    <div class="swatch"><div class="chip" style="background:#4A463E"></div><div><div class="name">Graphite</div><div class="hex">#4A463E</div></div></div>
  </div>
</body>
</html>
