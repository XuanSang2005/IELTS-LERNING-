<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type — Mono Figure Labels</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 28px; background: var(--ivory); }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .label { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.25em; font-size: 11px; }
  .g { color: var(--graphite); }
  .c { color: var(--claret); }
  .row { display: flex; gap: 18px; align-items: center; }
  .divider { flex: 1; border-top: 1px solid var(--line); }
  .note { font-family: var(--font-display); font-style: italic; font-size: 14px; color: var(--graphite); margin-top: 12px; }
  .d { color: var(--ochre); font-size: 10px; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><span class="label g">FIG. 01 —</span> <span class="label c">IELTS preparation, refined</span> <span class="divider"></span></div>
    <div class="row"><span class="label g">CH. II —</span> <span class="label c">Disciplines</span> <span class="divider"></span></div>
    <div class="row"><span class="label g">§ III —</span> <span class="label c">The Four Disciplines</span> <span class="divider"></span></div>
    <div class="row"><span class="label g">PL. 07 —</span> <span class="label c">Programme Guide</span> <span class="divider"></span></div>
    <div class="row"><span class="label g">TODAY · FRI 17 APR</span> <span class="d">◆</span> <span class="label g">WEEK 04 / XII</span> <span class="d">◆</span> <span class="label g">PHASE II — FOUNDATIONS</span></div>
  </div>
  <div class="note">JetBrains Mono · uppercase · 0.25em tracking · graphite + claret pair</div>
</body>
</html>
