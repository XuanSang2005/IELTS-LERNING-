<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Button — Primary (Signature)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--ivory); display: flex; flex-direction: column; gap: 20px; align-items: flex-start; }
  .btn { position: relative; display: inline-flex; align-items: center; gap: 12px; overflow: hidden;
    background: var(--ink-warm); color: var(--ivory); padding: 17px 36px; font-family: var(--font-body);
    font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.22em;
    text-decoration: none; transition: all 300ms var(--ease-editorial); }
  .btn::before { content:''; position:absolute; left:0; right:0; bottom:0; height:2px; background: var(--claret); }
  .btn:hover { background: var(--ink); transform: translateY(-2px); box-shadow: var(--shadow-hover); }
  .btn .arr { color: var(--claret); font-size: 13px; transition: transform 300ms var(--ease-editorial); }
  .btn:hover .arr { transform: translateX(4px); }
  .note { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.22em; font-size: 10px; color: var(--graphite); }
</style>
</head>
<body>
  <div class="note">FIG. 01 — Primary CTA · one per page</div>
  <a class="btn" href="#"><span>Begin your assessment</span><span class="arr">→</span></a>
  <div class="note">2px claret bottom rule · hover lifts 2px · claret-tinted shadow</div>
</body>
</html>
