<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Meridian — Dashboard (three variants)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; }
  body { background: #f0eee9; overflow: hidden; }
  .meridian-surface {
    background-color: var(--ivory);
    background-image: var(--paper-grain);
    background-size: 220px 220px;
    background-repeat: repeat;
    color: var(--ink);
    font-family: var(--font-body);
    min-height: 100%;
  }
  .meridian-surface img { display: block; }

  /* Tweaks panel */
  #tweaks {
    position: fixed; right: 20px; bottom: 20px; z-index: 9999;
    width: 300px; padding: 20px 22px 22px;
    background: #1a1815; color: #f6f1e7;
    border: 1px solid #6B1F1A;
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 13px; line-height: 1.45;
    box-shadow: 0 24px 48px -20px rgba(0,0,0,0.5);
    display: none;
  }
  #tweaks.visible { display: block; }
  #tweaks h3 {
    margin: 0 0 14px; font-family: 'Fraunces', Georgia, serif;
    font-style: italic; font-weight: 400; font-size: 22px;
    border-bottom: 1px solid rgba(246,241,231,0.2); padding-bottom: 10px;
  }
  #tweaks .group { margin-bottom: 14px; }
  #tweaks label {
    display: block; font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.24em;
    color: #c9bfa8; margin-bottom: 6px;
  }
  #tweaks select, #tweaks button {
    width: 100%; padding: 8px 10px;
    background: transparent; color: #f6f1e7;
    border: 1px solid rgba(246,241,231,0.3);
    font-family: inherit; font-size: 13px; cursor: pointer;
  }
  #tweaks .row { display: flex; gap: 6px; flex-wrap: wrap; }
  #tweaks .row button { flex: 1; min-width: 0; padding: 7px 4px; font-size: 11px; }
  #tweaks .row button.on { background: #6B1F1A; border-color: #6B1F1A; color: #f6f1e7; }
</style>
</head>
<body>

<div id="root"></div>

<div id="tweaks" aria-hidden="true">
  <h3>Tweaks</h3>
  <div class="group">
    <label>Student state</label>
    <div class="row" id="state-row">
      <button data-state="early-week">Week 02</button>
      <button data-state="mid-phase" class="on">Week 07</button>
      <button data-state="exam-ready">Week 11</button>
    </div>
  </div>
  <div class="group">
    <label>Show greeting</label>
    <div class="row" id="greet-row">
      <button data-greet="true" class="on">On</button>
      <button data-greet="false">Off</button>
    </div>
  </div>
  <div class="group">
    <label>Highlight variant</label>
    <div class="row" id="focus-row">
      <button data-focus="all" class="on">All</button>
      <button data-focus="A">A</button>
      <button data-focus="B">B</button>
      <button data-focus="C">C</button>
    </div>
  </div>
</div>

<!-- React + Motion + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
<script>
  if (!window.Motion && window.framerMotion) window.Motion = window.framerMotion;
</script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- UI kit source — shared pieces first -->
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="LandingPieces.jsx"></script>
<script type="text/babel" src="HeroAttractive.jsx"></script>
<script type="text/babel" src="DashboardShared.jsx"></script>
<script type="text/babel" src="DashboardBroadsheet.jsx"></script>
<script type="text/babel" src="DashboardNotebook.jsx"></script>
<script type="text/babel" src="DashboardPlate.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "state": "early-week",
  "showGreeting": true,
  "focus": "B"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  // Listen for host-driven tweak toggles + wire up the panel UI
  useEffect(() => {
    function onMsg(e) {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') {
        document.getElementById('tweaks').classList.add('visible');
      } else if (d.type === '__deactivate_edit_mode') {
        document.getElementById('tweaks').classList.remove('visible');
      }
    }
    window.addEventListener('message', onMsg);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}

    // Wire panel buttons
    function wire(rowId, key, coerce = (v) => v) {
      const row = document.getElementById(rowId);
      if (!row) return;
      row.addEventListener('click', (ev) => {
        const btn = ev.target.closest('button');
        if (!btn) return;
        const val = coerce(btn.dataset[key]);
        row.querySelectorAll('button').forEach(b => b.classList.toggle('on', b === btn));
        setTweaks(prev => {
          const next = { ...prev, [key]: val };
          try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*'); } catch(e) {}
          return next;
        });
      });
    }
    wire('state-row',  'state');
    wire('greet-row',  'greet', (v) => v === 'true');
    wire('focus-row',  'focus');

    return () => window.removeEventListener('message', onMsg);
  }, []);

  // Remap the Tweaks panel's data keys onto our tweaks object
  // (state-row uses data-state, greet-row uses data-greet, focus-row uses data-focus)
  // but we store as {state, showGreeting, focus}
  const state = tweaks.state || 'mid-phase';
  const showGreeting = tweaks.greet !== undefined ? tweaks.greet : (tweaks.showGreeting !== undefined ? tweaks.showGreeting : true);
  const focus = tweaks.focus || 'all';

  const showA = focus === 'all' || focus === 'A';
  const showB = focus === 'all' || focus === 'B';
  const showC = focus === 'all' || focus === 'C';

  return (
    <DesignCanvas>
      <DCSection
        id="dashboards"
        title="Dashboard — three variants"
        subtitle="Same student, same fixtures. Three different ways to treat the morning read — broadsheet, bound notebook, and plate-framed calendar. Use Tweaks to switch student state or focus on a single variant."
      >
        {showA && (
          <DCArtboard id="dashboard-a" label="A · Broadsheet" width={1560} height={1720}>
            <DashboardBroadsheet stateKey={state} showGreeting={showGreeting} />
          </DCArtboard>
        )}
        {showB && (
          <DCArtboard id="dashboard-b" label="B · Bound notebook" width={1280} height={2100}>
            <DashboardNotebook stateKey={state} showGreeting={showGreeting} />
          </DCArtboard>
        )}
        {showC && (
          <DCArtboard id="dashboard-c" label="C · Plate & calendar" width={1540} height={1480}>
            <DashboardPlate stateKey={state} showGreeting={showGreeting} />
          </DCArtboard>
        )}
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
