<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Meridian — UI Kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; }
  body { background: #f0eee9; overflow: hidden; }
  /* Artboards render inside design canvas — give them the paper backdrop. */
  .meridian-surface {
    background-color: var(--ivory);
    background-image: var(--paper-grain);
    background-size: 220px 220px;
    background-repeat: repeat;
    color: var(--ink);
    font-family: var(--font-body);
    min-height: 100%;
  }
  .meridian-surface.full {
    display: flex; flex-direction: column;
    min-height: 100vh;
  }
  .meridian-surface img { display: block; }
  /* Sample card with consistent inner padding. */
  .specimen-sample {
    padding: 32px;
    display: flex; align-items: center; justify-content: center;
    min-height: 100%;
  }
  /* Make motion import work */
</style>
</head>
<body>

<div id="root"></div>

<!-- React + Motion + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
<script>
  // framer-motion UMD sets window.Motion
  if (!window.Motion && window.framerMotion) window.Motion = window.framerMotion;
</script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- UI kit source -->
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="LandingPieces.jsx"></script>
<script type="text/babel" src="HeroOriginal.jsx"></script>
<script type="text/babel" src="HeroAttractive.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState } = React;

// ─── Full-page screens ───────────────────────────────────────

function LandingOriginal() {
  return (
    <div className="meridian-surface full" style={{ position: 'relative' }}>
      <BackgroundOrnaments />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
        <Nav />
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
          <HeroOriginal />
        </div>
        <TrustStrip />
      </div>
    </div>
  );
}

function LandingAttractive() {
  return (
    <div className="meridian-surface full" style={{ position: 'relative' }}>
      <BackgroundOrnaments />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
        <Nav />
        <HeroAttractive />
        <TrustStrip />
      </div>
    </div>
  );
}

// ─── Component samples ───────────────────────────────────────

function SamplePanel({ children, pad = 32 }) {
  return (
    <div className="meridian-surface" style={{ padding: pad, minHeight: '100%' }}>
      {children}
    </div>
  );
}

function NavSample() {
  return (
    <div className="meridian-surface" style={{ minHeight: '100%' }}>
      <Nav />
      <div style={{ padding: '24px 40px', fontFamily: 'var(--font-display)', fontStyle: 'italic', fontSize: 18, color: 'var(--graphite)' }}>
        (Content follows below…)
      </div>
    </div>
  );
}

function ButtonsSample() {
  return (
    <SamplePanel>
      <p style={{ fontFamily: 'var(--font-mono)', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.25em', color: 'var(--graphite)', margin: 0 }}>
        FIG. 01 — Primary CTA
      </p>
      <div style={{ marginTop: 14 }}>
        <PrimaryButton>Begin your assessment</PrimaryButton>
      </div>
      <div style={{ marginTop: 32 }}>
        <p style={{ fontFamily: 'var(--font-mono)', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.25em', color: 'var(--graphite)', margin: 0 }}>FIG. 02 — Secondary</p>
        <div style={{ marginTop: 14, display: 'flex', gap: 20, alignItems: 'center' }}>
          <OutlineButton>Sign up</OutlineButton>
          <TextLink>Read the method</TextLink>
        </div>
      </div>
      <div style={{ marginTop: 40, paddingTop: 20, borderTop: '1px solid var(--line)', fontFamily: 'var(--font-display)', fontStyle: 'italic', fontSize: 13, color: 'var(--graphite)' }}>
        Hover the primary button. It lifts 2px, darkens to ink, the arrow nudges right in claret.
      </div>
    </SamplePanel>
  );
}

function SpecimenSample() {
  return (
    <div className="specimen-sample">
      <SpecimenCard />
    </div>
  );
}

function PolaroidSample() {
  return (
    <SamplePanel pad={40}>
      <div style={{ display: 'flex', gap: 40, justifyContent: 'center', alignItems: 'center', height: '100%' }}>
        <Polaroid src="../../assets/edition-01.jpg" alt="" edition="Edition № I" tint="claret" rotate={-4} width={160} />
        <Polaroid src="../../assets/edition-03.jpg" alt="" edition="Edition № II" tint="sage" rotate={3} orientation="landscape" width={180} />
      </div>
    </SamplePanel>
  );
}

function TypeSpecimen() {
  return (
    <SamplePanel>
      <p style={{ fontFamily: 'var(--font-mono)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.25em', color: 'var(--graphite)', margin: 0 }}>
        <span>FIG. 07 —</span> <span style={{ color: 'var(--claret)' }}>Type, in use</span>
      </p>
      <h1 style={{ margin: '24px 0 0', fontFamily: 'var(--font-display)', fontWeight: 400, fontSize: 72, lineHeight: 0.95, letterSpacing: '-0.02em', color: 'var(--ink)' }}>
        The quiet <UnderlinedItalic>craft</UnderlinedItalic>.
      </h1>
      <p style={{ marginTop: 28, maxWidth: '54ch', fontFamily: 'var(--font-body)', fontSize: 17, lineHeight: 1.65, color: 'var(--graphite)' }}>
        Fraunces carries the headline, italicised on one word. Geist carries the body —
        quiet, evenly-weighted, never shouting. JetBrains Mono, tightly tracked and uppercased,
        marks the figure labels above each block.
      </p>
      <blockquote style={{ margin: '32px 0 0', borderLeft: '2px solid var(--claret)', paddingLeft: 24, fontFamily: 'var(--font-display)', fontStyle: 'italic', fontSize: 22, lineHeight: 1.4, color: 'var(--ink)', maxWidth: '50ch' }}>
        "The candidate who plateaus does not lack effort. They lack a system."
      </blockquote>
      <p style={{ marginTop: 14, fontFamily: 'var(--font-mono)', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.25em', color: 'var(--graphite)' }}>— Editorial note</p>
    </SamplePanel>
  );
}

function TrustSample() {
  return (
    <div className="meridian-surface" style={{ minHeight: '100%', display: 'flex', flexDirection: 'column', justifyContent: 'flex-end' }}>
      <TrustStrip />
    </div>
  );
}

function DisciplineSample() {
  return (
    <SamplePanel pad={0}>
      <div style={{ padding: '32px 40px 16px' }}>
        <p style={{ fontFamily: 'var(--font-mono)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.25em', color: 'var(--graphite)', margin: 0 }}>
          <span>CH. III —</span> <span style={{ color: 'var(--claret)' }}>The four disciplines</span>
        </p>
      </div>
      <DisciplineStrip />
      <div style={{ padding: '24px 40px', fontFamily: 'var(--font-display)', fontStyle: 'italic', fontSize: 14, color: 'var(--graphite)' }}>
        Hover a discipline. The row tints claret quietly; writing — the accent chapter — is highlighted by default.
      </div>
    </SamplePanel>
  );
}

// ─── Canvas ───────────────────────────────────────

function App() {
  return (
    <DesignCanvas>
      <DCSection id="heroes" title="Hero — Landing page" subtitle="Original (codebase) vs. a more attractive variant. Same brand rules, more editorial weight.">
        <DCArtboard id="hero-original" label="A · Original (codebase)" width={1440} height={900}>
          <LandingOriginal />
        </DCArtboard>
        <DCArtboard id="hero-attractive" label="B · Attractive · proposed" width={1440} height={1120}>
          <LandingAttractive />
        </DCArtboard>
      </DCSection>

      <DCSection id="pieces" title="Attractive hero — pieces" subtitle="The new components used by the proposed hero, in isolation.">
        <DCArtboard id="discipline" label="Four Disciplines strip" width={720} height={280}>
          <DisciplineSample />
        </DCArtboard>
        <DCArtboard id="type" label="Type specimen" width={720} height={480}>
          <TypeSpecimen />
        </DCArtboard>
      </DCSection>

      <DCSection id="components" title="Shared components" subtitle="Nav, buttons, specimen card, polaroid, trust strip — all drawn from the codebase.">
        <DCArtboard id="nav" label="Nav" width={1280} height={140}>
          <NavSample />
        </DCArtboard>
        <DCArtboard id="buttons" label="Buttons & links" width={520} height={360}>
          <ButtonsSample />
        </DCArtboard>
        <DCArtboard id="specimen" label="Specimen card" width={460} height={520}>
          <SpecimenSample />
        </DCArtboard>
        <DCArtboard id="polaroid" label="Polaroids" width={560} height={400}>
          <PolaroidSample />
        </DCArtboard>
        <DCArtboard id="trust" label="Trust strip" width={1280} height={140}>
          <TrustSample />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
